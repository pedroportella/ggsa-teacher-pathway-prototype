name: ggsa-teacher-pathway-frontend
region: syd
services:
  - name: portal
    github:
      repo: pedroportella/ggsa-teacher-pathway-prototype
      branch: main
      deploy_on_push: true
    source_dir: frontend
    dockerfile_path: frontend/Dockerfile
    http_port: 5173
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: WORDPRESS_API_BASE_URL
        value: "__WORDPRESS_API_BASE_URL__"
        scope: RUN_AND_BUILD_TIME
      - key: GGSA_TEACHER_PATHWAY_API_TOKEN
        value: "__GGSA_TEACHER_PATHWAY_API_TOKEN__"
        type: SECRET
        scope: RUN_TIME
      - key: NEXT_TELEMETRY_DISABLED
        value: "__NEXT_TELEMETRY_DISABLED__"
        scope: RUN_AND_BUILD_TIME
