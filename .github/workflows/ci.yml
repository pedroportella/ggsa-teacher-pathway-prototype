name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.18.3 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Build
        run: pnpm build

      - name: Upload Next.js build artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: portal-next-build
          path: frontend/apps/portal/.next
          if-no-files-found: ignore
          retention-days: 7

  backend-quality:
    name: WordPress plugin quality
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, pdo_sqlite, sqlite3, zip
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer --working-dir=backend/wp-content/plugins/ggsa-teacher-pathway install --no-interaction --prefer-dist
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GITHUB_TOKEN }}"}}'

      - name: Prepare local WordPress runtime
        run: sh scripts/local-backend-setup.sh

      - name: PHP syntax, PHPCS, PHPStan and REST contracts
        run: composer --working-dir=backend/wp-content/plugins/ggsa-teacher-pathway run quality

  playwright-smoke:
    name: Playwright smoke
    runs-on: ubuntu-22.04
    needs:
      - frontend-quality
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.18.3 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run mocked Playwright suite
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-smoke-report
          path: frontend/apps/portal/playwright-report
          if-no-files-found: ignore
          retention-days: 7

  real-backend-playwright:
    name: Real backend Playwright
    runs-on: ubuntu-22.04
    needs:
      - frontend-quality
      - backend-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.18.3 --activate

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, pdo_sqlite, sqlite3, zip
          coverage: none
          tools: composer:v2

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Install Composer dependencies
        run: composer --working-dir=backend/wp-content/plugins/ggsa-teacher-pathway install --no-interaction --prefer-dist
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GITHUB_TOKEN }}"}}'

      - name: Install Playwright browser
        run: pnpm --dir frontend exec playwright install --with-deps chromium

      - name: Run real-backend Playwright suite
        run: pnpm test:e2e:local:real

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: real-backend-playwright-report
          path: frontend/apps/portal/playwright-report
          if-no-files-found: ignore
          retention-days: 7

  docker-build:
    name: Docker build
    runs-on: ubuntu-22.04
    needs:
      - frontend-quality
      - backend-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build WordPress and frontend images
        run: docker compose build wordpress frontend
