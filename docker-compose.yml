services:
  wordpress:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ggsa-teacher-pathway-backend:local
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_NAME: ggsa_teacher_pathway
      WORDPRESS_DB_USER: ggsa_teacher_pathway
      WORDPRESS_DB_PASSWORD: ggsa_teacher_pathway
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_ENVIRONMENT_TYPE', 'local');
        define('WP_DEBUG', true);
        define('WP_DEBUG_DISPLAY', false);
    volumes:
      - wordpress-data:/var/www/html
    depends_on:
      - mariadb

  wordpress-setup:
    image: wordpress:cli
    entrypoint:
      - sh
      - -c
      - |
        until [ -f wp-config.php ]; do sleep 2; done;
        until wp db check --allow-root >/dev/null 2>&1; do sleep 2; done;
        if ! wp core is-installed --allow-root >/dev/null 2>&1; then
          wp core install --url=http://localhost:8080 --title='GGSA Teacher Pathway Portal' --admin_user=admin --admin_password=admin --admin_email=admin@example.test --skip-email --allow-root;
        fi;
        wp plugin activate ggsa-teacher-pathway --allow-root;
        wp option update permalink_structure '/%postname%/' --allow-root;
        wp rewrite flush --hard --allow-root
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_NAME: ggsa_teacher_pathway
      WORDPRESS_DB_USER: ggsa_teacher_pathway
      WORDPRESS_DB_PASSWORD: ggsa_teacher_pathway
    volumes:
      - wordpress-data:/var/www/html
    depends_on:
      - wordpress
      - mariadb

  mariadb:
    image: mariadb:11.4
    environment:
      MYSQL_DATABASE: ggsa_teacher_pathway
      MYSQL_USER: ggsa_teacher_pathway
      MYSQL_PASSWORD: ggsa_teacher_pathway
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mariadb-data:/var/lib/mysql

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ggsa-teacher-pathway-frontend:local
    ports:
      - "5173:5173"
    environment:
      WORDPRESS_API_BASE_URL: http://wordpress/wp-json/ggsa/v1
    depends_on:
      - wordpress
      - wordpress-setup

volumes:
  wordpress-data:
  mariadb-data:
